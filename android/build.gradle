buildscript {
  ext {
    kotlinVersion = rootProject.ext.has("kotlinVersion") ? rootProject.ext.get("kotlinVersion") : "1.9.24"
  }
  repositories {
    google()
    mavenCentral()
  }
  dependencies {
    classpath("org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlinVersion")
  }
}

apply plugin: "com.android.library"
apply plugin: "kotlin-android"
apply plugin: "com.facebook.react"

def safeExtGet(prop, fallback) {
  rootProject.ext.has(prop) ? rootProject.ext.get(prop) : fallback
}

android {
  namespace "com.easy.bg"
  compileSdkVersion safeExtGet("compileSdkVersion", 34)

  defaultConfig {
    minSdkVersion safeExtGet("minSdkVersion", 24)
    targetSdkVersion safeExtGet("targetSdkVersion", 34)
    versionCode 1
    versionName "0.1.0"
    consumerProguardFiles "consumer-rules.pro"
  }

  sourceSets {
    main {
      java.srcDirs += ["$buildDir/generated/source/codegen/java"]
    }
  }

  lintOptions {
    abortOnError false
  }
}

react {
  jsRootDir = file("../src")
  libraryName = "BackgroundUploadSpec"
  codegenJavaPackageName = "com.easy.bg"
}

repositories {
  mavenCentral()
  google()
}

dependencies {
  implementation("com.facebook.react:react-native:+")
  implementation("org.jetbrains.kotlin:kotlin-stdlib:${kotlinVersion}")
  implementation("androidx.core:core-ktx:1.13.1")
  implementation("androidx.work:work-runtime-ktx:2.10.0")
  implementation("com.squareup.okhttp3:okhttp:4.12.0")
}
